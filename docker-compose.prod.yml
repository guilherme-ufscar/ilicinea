services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: ilicinea_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - STRIPE_PRICE_ESSENCIAL_MENSAL=${STRIPE_PRICE_ESSENCIAL_MENSAL}
      - STRIPE_PRICE_ESSENCIAL_ANUAL=${STRIPE_PRICE_ESSENCIAL_ANUAL}
      - STRIPE_PRICE_PROFISSIONAL=${STRIPE_PRICE_PROFISSIONAL}
      - UPLOAD_DIR=${UPLOAD_DIR:-public/uploads}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-5242880}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    volumes:
      # Acumula os chunks estáticos entre deploys → evita 404 / tela branca
      - ilicinea_static:/app/.next/static
      - ilicinea_uploads:/app/public/uploads
    ports:
      - "${PUBLIC_APP_PORT:-10203}:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ilicinea_net

  db:
    image: postgres:16-alpine
    container_name: ilicinea_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ilicinea_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ilicinea_net

volumes:
  ilicinea_pgdata:
  ilicinea_static:
  ilicinea_uploads:

networks:
  ilicinea_net:
    driver: bridge
