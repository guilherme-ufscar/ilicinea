# Configuração Nginx — ilicinea.com
# Proxy reverso para container Docker na porta 10203
# SEM cache no proxy (Next.js já gerencia cache próprio via ISR/SSR)

server {
    listen 80;
    listen 443 ssl http2;
    listen [::]:80;
    server_name ilicinea.com;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/ilicinea.com;

    include /www/server/panel/vhost/nginx/extension/ilicinea.com/*.conf;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/ilicinea.com.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/ilicinea.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/ilicinea.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START
    include enable-php-00.conf;
    #PHP-INFO-END

    #GZIP START
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    #GZIP END

    #PROXY-CONF-START

    # Estáticos com hash no nome: cacheáveis para sempre no browser
    location ^~ /_next/static/ {
        proxy_pass http://127.0.0.1:10203;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Uploads de usuários: também imutáveis por hash
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:10203;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Páginas HTML e API: NUNCA cachear no browser
    # Isso garante que após um novo deploy o browser sempre busca o HTML
    # atualizado com os hashes corretos dos chunks JS/CSS
    location / {
        proxy_pass http://127.0.0.1:10203;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Real-Port $remote_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-HOST $remote_addr;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Força no-cache no browser para páginas HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    #PROXY-CONF-END

    # Proteção de arquivos sensíveis
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    # Certificado SSL
    location /.well-known {
        allow all;
        root /www/wwwroot/ilicinea.com;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # Logs
    access_log  /www/wwwlogs/ilicinea.com.log;
    error_log  /www/wwwlogs/ilicinea.com.error.log;
}
